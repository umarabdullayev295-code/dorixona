<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>PharmaCare - Dorilar Inventari</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="logo"><i class="fas fa-clinic-medical"></i> Pharma<span>Care</span></a>
        <div class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Bosh sahifa</a></li>
            <li><a href="medicines.html" class="active">Dorilar</a></li>
            <li><a href="sales.html">Sotuv</a></li>
            <li><a href="reports.html">Hisobotlar</a></li>
            <li class="mobile-only-btn"><a href="login.html" class="btn-outline" style="display:inline-block;text-decoration:none;margin-top:1rem;"><i class="fas fa-user-circle"></i> Kirish</a></li>
        </ul>
        <a href="login.html" class="btn-outline desktop-only-btn"><i class="fas fa-user-circle"></i> Kirish</a>
    </nav>

    <main class="page-section">
        <div class="page-header">
            <h1>Dorilar <span class="gradient-text">Inventari</span></h1>
            <p id="medCount">Yuklanmoqda...</p>
            <div class="search-toolbar">
                <div class="search-bar-glass search-bar-wide">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="200 ta doridan qidiring (nom, kategoriya)..." id="medicineSearch" autocomplete="off">
                    <button type="button" class="search-clear" id="searchClear" title="Tozalash"><i class="fas fa-times"></i></button>
                </div>
                <button class="btn-primary" onclick="document.getElementById('addModal').style.display='flex'">
                    <i class="fas fa-plus"></i> Dori Qo'shish
                </button>
            </div>
        </div>

        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterMeds('all', this)">Barchasi</button>
            <button class="filter-tab" onclick="filterMeds('antibiotic', this)">Antibiotiklar</button>
            <button class="filter-tab" onclick="filterMeds('vitamin', this)">Vitaminlar</button>
            <button class="filter-tab" onclick="filterMeds('painkiller', this)">Og'riq qoldiruvchi</button>
            <button class="filter-tab" onclick="filterMeds('cardiac', this)">Yurak dorilar</button>
            <button class="filter-tab" onclick="filterMeds('expired', this)">⚠️ Muddati yaqin</button>
        </div>

        <div class="medicines-table-wrap glass-panel">
            <table class="medicines-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Dori nomi</th>
                        <th>Kategoriya</th>
                        <th>Miqdor</th>
                        <th>Narx (dona)</th>
                        <th>Yaroqlilik muddati</th>
                        <th>Holat</th>
                        <th>Amallar</th>
                    </tr>
                </thead>
                <tbody id="medicinesList"></tbody>
            </table>
        </div>
        <div id="medPagination" class="pagination-wrap"></div>
    </main>

    <div class="modal-overlay" id="addModal" style="display:none;">
        <div class="modal-box glass-panel">
            <h3><i class="fas fa-plus-circle" style="color:#0284c7;"></i> Yangi Dori Qo'shish</h3>
            <form id="addMedForm">
                <div class="date-time-group">
                    <div class="input-group">
                        <label>Dori nomi</label>
                        <input type="text" id="addMedName" placeholder="Masalan: Paracetamol 500mg" required>
                    </div>
                    <div class="input-group">
                        <label>Kategoriya</label>
                        <select id="addMedCategory" required>
                            <option value="" disabled selected>Tanlang...</option>
                            <option>Antibiotik</option>
                            <option>Vitamin</option>
                            <option>Og'riq qoldiruvchi</option>
                            <option>Yurak dori</option>
                            <option>Boshqa</option>
                        </select>
                    </div>
                </div>
                <div class="date-time-group">
                    <div class="input-group">
                        <label>Shakl</label>
                        <select id="addMedFormType" required>
                            <option>Tabletka</option>
                            <option>Kapsul</option>
                            <option>Sirop</option>
                            <option>Ampula</option>
                            <option>Spray</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Miqdor (dona)</label>
                        <input type="number" id="addMedQty" min="0" placeholder="100" required>
                    </div>
                </div>
                <div class="date-time-group">
                    <div class="input-group">
                        <label>Narx (so'm)</label>
                        <input type="number" id="addMedPrice" min="0" placeholder="5000" required>
                    </div>
                    <div class="input-group">
                        <label>Yaroqlilik muddati</label>
                        <input type="date" id="addMedExpiry" required>
                    </div>
                </div>
                <div style="display:flex; gap:1rem; margin-top:1rem;">
                    <button type="submit" class="btn-primary" style="flex:1;"><i class="fas fa-save"></i> Saqlash</button>
                    <button type="button" class="btn-outline" onclick="document.getElementById('addModal').style.display='none'" style="flex:1;">Bekor</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="editModal" style="display:none;">
        <div class="modal-box glass-panel">
            <h3><i class="fas fa-edit" style="color:#0284c7;"></i> Dorini Tahrirlash</h3>
            <form id="editMedForm">
                <input type="hidden" id="editMedId">
                <div class="date-time-group">
                    <div class="input-group">
                        <label>Dori nomi</label>
                        <input type="text" id="editMedName" required>
                    </div>
                    <div class="input-group">
                        <label>Kategoriya</label>
                        <select id="editMedCategory" required>
                            <option>Antibiotik</option>
                            <option>Vitamin</option>
                            <option>Og'riq qoldiruvchi</option>
                            <option>Yurak dori</option>
                            <option>Boshqa</option>
                        </select>
                    </div>
                </div>
                <div class="date-time-group">
                    <div class="input-group">
                        <label>Shakl</label>
                        <select id="editMedFormType" required>
                            <option>Tabletka</option>
                            <option>Kapsul</option>
                            <option>Sirop</option>
                            <option>Ampula</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Miqdor</label>
                        <input type="number" id="editMedQty" min="0" required>
                    </div>
                </div>
                <div class="date-time-group">
                    <div class="input-group">
                        <label>Narx (so'm)</label>
                        <input type="number" id="editMedPrice" min="0" required>
                    </div>
                    <div class="input-group">
                        <label>Yaroqlilik muddati</label>
                        <input type="date" id="editMedExpiry" required>
                    </div>
                </div>
                <div style="display:flex; gap:1rem; margin-top:1rem;">
                    <button type="submit" class="btn-primary" style="flex:1;">Yangilash</button>
                    <button type="button" class="btn-outline" onclick="document.getElementById('editModal').style.display='none'" style="flex:1;">Bekor</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js?v=5"></script>
</body>
</html>
