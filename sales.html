<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaCare - Sotuv Tizimi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo"><i class="fas fa-clinic-medical"></i> Pharma<span>Care</span></a>
        <div class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Bosh sahifa</a></li>
            <li><a href="medicines.html">Dorilar</a></li>
            <li><a href="sales.html" class="active">Sotuv</a></li>
            <li><a href="reports.html">Hisobotlar</a></li>
        </ul>
        <a href="login.html" class="btn-outline desktop-only-btn"><i class="fas fa-user-circle"></i> Kirish</a>
    </nav>

    <main class="page-section">
        <div class="page-header">
            <h1>Sotuv <span class="gradient-text">Tizimi</span></h1>
            <p>200 ta doridan qidiring va sotuv qiling</p>
        </div>

        <div class="sales-layout">
            <div class="sales-form-panel glass-panel">
                <h3><i class="fas fa-cash-register" style="color:#0284c7;"></i> Yangi Sotuv</h3>
                <form id="saleForm">
                    <div class="input-group sale-search-wrap">
                        <label><i class="fas fa-search"></i> Dori nomi</label>
                        <input type="text" id="saleSearch" placeholder="Qidiring va ro'yxatdan tanlang..." autocomplete="off">
                        <div id="saleDropdown" class="autocomplete-dropdown"></div>
                    </div>
                    <div class="date-time-group">
                        <div class="input-group">
                            <label>Miqdor</label>
                            <input type="number" id="saleQty" min="1" value="1">
                        </div>
                        <div class="input-group">
                            <label>Birlik narxi</label>
                            <input type="number" id="salePrice" readonly style="background:#f1f5f9;">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Mijoz (ixtiyoriy)</label>
                        <input type="text" id="saleCustomer" placeholder="Ism yoki telefon">
                    </div>
                    <div class="input-group">
                        <label>To'lov usuli</label>
                        <select id="payMethod">
                            <option value="cash">Naqd pul</option>
                            <option value="card">Plastik karta</option>
                            <option value="transfer">O'tkazma</option>
                        </select>
                    </div>
                    <div class="price-estimate" style="margin-bottom:1.5rem;">
                        <span>Jami:</span>
                        <strong id="saleTotalDisplay">0 so'm</strong>
                    </div>
                    <button type="submit" class="btn-primary"><i class="fas fa-check-circle"></i> Sotuvni Tasdiqlash</button>
                </form>
            </div>

            <div class="sales-history-panel">
                <div class="sales-history-header">
                    <h3><i class="fas fa-receipt" style="color:#10b981;"></i> Bugungi Cheklar</h3>
                    <div class="today-total glass-panel">
                        <span>Bugungi daromad:</span>
                        <strong id="todayTotal">0 so'm</strong>
                    </div>
                </div>
                <div id="salesList"></div>
            </div>
        </div>
    </main>
    <script src="script.js?v=5"></script>
</body>
</html>
